name: Deploy NodeJS Application to My EC2 Instance

on: 
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Deploy Via SSH
        uses: appleboy/ssh-action@v1
        with: 
          host: ${{ secrets.SSH_HOST }} 
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/Node-Application-CICD-Demo-Project
            git pull
            docker compose up -d --build
